version: '3.8'

services:
  talent-finder-pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talent-finder-pro
    ports:
      - "9876:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

